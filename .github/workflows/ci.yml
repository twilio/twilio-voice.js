# Platform build/CI for @twilio/voice-sdk (VBLOCKS-6900, ADR 1634 / PEA-198).
# Modeled on twilio/twilio-agent-connect-typescript's ci.yml, adapted for voice-js:
#   - NO fork CI (lead decision 2026-07-06, stricter than the program). Jobs run
#     unconditionally on the trusted runner; the job-level `if` guard is a
#     defense-in-depth backstop so a fork PR can never execute even if repo
#     settings drift. See VBLOCKS-6900 and the no-fork-CI decision.
#   - Every `uses:` is full-SHA-pinned (repo enforces sha_pinning_required: true,
#     allowed_actions: selected; tags are rejected at startup).
#   - e2e (Cypress/docker) is out of scope here — owned by VBLOCKS-6876.
name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL }}
  # Install-hardening: block browser-binary downloads during `npm ci` so a
  # compromised transitive postinstall can't pull arbitrary binaries. The build
  # jobs never launch browsers; e2e (6876) manages its own browser provisioning.
  CYPRESS_INSTALL_BINARY: '0'
  PUPPETEER_SKIP_DOWNLOAD: '1'
  GECKODRIVER_SKIP_DOWNLOAD: 'true'

jobs:
  lint:
    name: lint
    # Defense-in-depth: never run on a fork PR (voice-js runs no fork CI).
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-x64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Artifactory OIDC Auth
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: ./.github/actions/artifactory-oidc
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint

  typecheck:
    name: typecheck
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-x64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Artifactory OIDC Auth
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: ./.github/actions/artifactory-oidc
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:constants && npm run build:errors
      - run: npm run test:typecheck

  test:
    name: test (node ${{ matrix.node }})
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-x64
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Artifactory OIDC Auth
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: ./.github/actions/artifactory-oidc
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      # Build first: test:es5/test:esm validate the es5/ and esm/ build outputs.
      - run: npm run build
      - run: npm run test:es5
      - run: npm run test:esm
      - run: npm run test:unit
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && matrix.node == 22 }}
        with:
          name: coverage
          path: coverage

  build:
    name: build
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-x64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Artifactory OIDC Auth
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: ./.github/actions/artifactory-oidc
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Check build output
        run: |
          echo "dist/ output:"
          ls -lah dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  all-checks:
    name: all-checks
    needs: [lint, typecheck, test, build]
    if: always()
    runs-on: ubuntu-x64
    steps:
      - name: Check all job statuses
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed successfully!"
