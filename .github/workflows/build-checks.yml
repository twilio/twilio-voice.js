# Ports the CircleCI `build-checks` command (.circleci/config.yml) to GitHub Actions.
# Runs lint + ES5/ESM checks + typecheck + unit tests. No secrets, no browser — fully
# runnable locally with `act`. See voicejs-circleci-to-github-actions-migration.md.
#
# NOTE: Datadog test-visibility instrumentation (the `DD_SERVICE` export +
# `test-visibility-circleci-orb/autoinstrument` steps in CircleCI) is intentionally
# omitted here — it needs a DD_API_KEY secret and is deferred to the secret-bound
# migration milestone. Its absence does not affect build/lint/test correctness.
name: build-checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:build && npm run test:unit
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: coverage
