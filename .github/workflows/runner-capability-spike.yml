# Throwaway de-risking spike for VBLOCKS-6902.
# Probes what a GHA runner can actually do for voice-js e2e BEFORE the full
# e2e workflow (VBLOCKS-6876) is built. No secrets. Runs on both Enterprise
# runner tiers (ubuntu-latest-large, ubuntu-x64) so postures compare side by
# side. (No fork runner: voice-js runs no fork CI, so ubuntu-latest is N/A.)
#
# Every result line is emitted with a "SPIKE|" prefix to stdout AND appended to
# the step summary, so verdicts are readable both in the UI and via the gh CLI
# (`gh run view --job=<id> --log | grep 'SPIKE|'`).
#
# What voice-js actually hits (lib/twilio/regions.ts):
#   Signaling: wss://voice-js.<edge>.twilio.com/signal   (default edge = roaming)
#   Insights:  eventgw.twilio.com
#   Media ICE: STUN/TURN are vended dynamically by Twilio NTS at call setup,
#              NOT hardcoded in the SDK. We probe the NTS public endpoints as a
#              proxy for the runner's network posture (UDP egress + TURN/443).
#              Green here is necessary-but-not-sufficient; live media is 6876.
name: Runner Capability Spike

on:
  workflow_dispatch:
  # TEMPORARY (VBLOCKS-6902): run on this branch's PR so the spike is
  # dispatchable without merging to master. Revert to workflow_dispatch-only
  # before this workflow lands.
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        # Org locked runners to Enterprise-managed only; plain ubuntu-latest
        # has no runner and would hang queued. ubuntu-latest-large is the
        # standard-tier Enterprise runner, ubuntu-x64 the 16-core tier.
        runner: [ubuntu-latest-large, ubuntu-x64]
    name: Probe (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    env:
      R: ${{ matrix.runner }}
    steps:
      - name: Runner identity
        run: |
          say() { echo "SPIKE|${R}|$*"; echo "- $*" >> "$GITHUB_STEP_SUMMARY"; }
          echo "## Runner: ${R}" >> "$GITHUB_STEP_SUMMARY"
          say "os: $(uname -a)"
          say "arch: $(uname -m)"

      # --- Probe 1: Browser availability ------------------------------------
      # voice-js e2e needs a browser with fake-media WebRTC. The internal
      # ubuntu-x64 image may not ship one; ubuntu-latest-large should.
      - name: Browser availability
        continue-on-error: true
        run: |
          say() { echo "SPIKE|${R}|$*"; echo "- $*" >> "$GITHUB_STEP_SUMMARY"; }
          echo "### Browsers" >> "$GITHUB_STEP_SUMMARY"
          for b in google-chrome google-chrome-stable chromium chromium-browser firefox; do
            if command -v "$b" >/dev/null 2>&1; then
              say "FOUND $b -> $("$b" --version 2>/dev/null || echo '?')"
            else
              say "missing $b"
            fi
          done

      # --- Probe 2: Signaling (WSS) reachability ----------------------------
      # TCP+TLS reach to the real signaling + insights hosts. Default edge is
      # roaming; ashburn included as a concrete US edge.
      - name: Signaling / insights reachability
        continue-on-error: true
        run: |
          say() { echo "SPIKE|${R}|$*"; echo "- $*" >> "$GITHUB_STEP_SUMMARY"; }
          echo "### Signaling (TCP/TLS :443)" >> "$GITHUB_STEP_SUMMARY"
          for host in voice-js.roaming.twilio.com voice-js.ashburn.twilio.com eventgw.twilio.com; do
            if timeout 10 bash -c "echo | openssl s_client -connect ${host}:443 -servername ${host}" >/dev/null 2>&1; then
              say "OK   ${host}:443 (TLS handshake)"
            else
              say "FAIL ${host}:443"
            fi
          done

      # --- Probe 3: WebRTC network posture (STUN / TURN) --------------------
      # STUN over UDP/3478 = can the runner do UDP hole-punching at all.
      # TURN over TCP/443  = the fallback relay path when UDP is blocked.
      # Endpoints are Twilio NTS public defaults. This is a network-capability
      # proxy, not proof that per-call media flows (that is 6876 with a token).
      - name: WebRTC UDP egress + STUN binding
        continue-on-error: true
        run: |
          say() { echo "SPIKE|${R}|$*"; echo "- $*" >> "$GITHUB_STEP_SUMMARY"; }
          echo "### WebRTC network posture" >> "$GITHUB_STEP_SUMMARY"

          # STUN binding request over UDP/3478 (necessary condition for ICE
          # srflx). No apt dependency: Python 3 is preinstalled, and a STUN
          # binding request is a fixed 20-byte packet. A success response whose
          # transaction ID echoes ours proves UDP egress + a server-reflexive
          # address came back.
          STUN_OUT=$(timeout 15 python3 - <<'PY' 2>&1 || true
          import socket, os, struct
          # type=0x0001 (Binding Request), len=0, magic cookie, 12-byte txn id
          txn = os.urandom(12)
          pkt = struct.pack('>HHI', 0x0001, 0, 0x2112A442) + txn
          s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
          s.settimeout(8)
          try:
              s.sendto(pkt, ('global.stun.twilio.com', 3478))
              data, _ = s.recvfrom(2048)
          except Exception as e:
              print('NORESP', e); raise SystemExit(0)
          # success response type is 0x0101; txn id must echo
          if len(data) >= 20 and data[0:2] == b'\x01\x01' and data[8:20] == txn:
              print('OK STUN binding success (srflx returned)')
          else:
              print('BADRESP', data[:4].hex())
          PY
          )
          echo "$STUN_OUT"
          if echo "$STUN_OUT" | grep -q "OK STUN binding success"; then
            say "OK   STUN udp/3478 (binding success; UDP egress works)"
          else
            say "FAIL STUN udp/3478 (no valid binding response; UDP likely blocked)"
          fi

          # TURN frontend TCP reachability on 443 (the UDP-blocked fallback path)
          if timeout 10 bash -c "echo | openssl s_client -connect global.turn.twilio.com:443" >/dev/null 2>&1; then
            say "OK   TURN tcp/443 (TLS reachable)"
          else
            say "FAIL TURN tcp/443"
          fi

      # --- Probe 4: ngrok inbound tunnel ------------------------------------
      # Top portability risk: the relay-server userDefinedMessage specs need a
      # publicly reachable inbound callback URL (currently ngrok). A locked-down
      # runner may block inbound tunnels entirely. No auth token -> anonymous
      # tunnel; we only need to learn whether the tunnel can be established and
      # reached from outside.
      - name: ngrok inbound tunnel feasibility
        continue-on-error: true
        run: |
          say() { echo "SPIKE|${R}|$*"; echo "- $*" >> "$GITHUB_STEP_SUMMARY"; }
          echo "### ngrok inbound tunnel" >> "$GITHUB_STEP_SUMMARY"
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o /tmp/ngrok.tgz 2>/dev/null || true
          tar -xzf /tmp/ngrok.tgz -C /tmp 2>/dev/null || true
          if [ ! -x /tmp/ngrok ]; then
            say "SKIP ngrok binary not fetched"
            exit 0
          fi
          python3 -m http.server 8080 >/dev/null 2>&1 &
          /tmp/ngrok http 8080 --log=stdout >/tmp/ngrok.log 2>&1 &
          sleep 8
          URL=$(curl -s http://127.0.0.1:4040/api/tunnels 2>/dev/null | grep -oE 'https://[a-z0-9.-]+ngrok[a-z0-9.-]*' | head -1)
          if [ -n "$URL" ]; then
            say "OK   tunnel up: ${URL}"
            if curl -sS --max-time 10 "$URL" >/dev/null 2>&1; then
              say "OK   tunnel reachable from runner egress"
            else
              say "WARN tunnel established but not reachable"
            fi
          else
            say "FAIL tunnel not established (inbound tunnels may be blocked)"
            echo "--- ngrok.log tail ---"
            tail -20 /tmp/ngrok.log 2>/dev/null || true
          fi
